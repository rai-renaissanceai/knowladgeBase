document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ly:'Archivo',sans-serif;font-size:24px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:#00A3E0;margin-bottom:22px;\">Cómo trabajamos<\u002Fdiv>\n    <h2 style=\"font-family:'Archivo',sans-serif;font-size:64px;font-weight:700;line-height:1.04;letter-spacing:-0.01em;margin:0;max-width:1180px;\">De la personalidad a una oferta empaquetada<\u002Fh2>\n  <\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:34px;margin-top:auto;margin-bottom:8px;\">\n    <div style=\"background:#FFFFFF;border:1px solid #E2E8F2;border-radius:18px;padding:44px 40px;\">\n      <div style=\"font-family:'Archivo',sans-serif;font-size:30px;font-weight:800;color:#00A3E0;margin-bottom:24px;\">01<\u002Fdiv>\n      <div style=\"font-family:'Archivo',sans-serif;font-size:32px;font-weight:700;margin-bottom:16px;\">Perfil e intereses<\u002Fdiv>\n      <div style=\"font-size:26px;line-height:1.4;color:#56657E;\">Personalidad, motivaciones y objetivo profesional del estudiante o ejecutivo.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#FFFFFF;border:1px solid #E2E8F2;border-radius:18px;padding:44px 40px;\">\n      <div style=\"font-family:'Archivo',sans-serif;font-size:30px;font-weight:800;color:#E6007E;margin-bottom:24px;\">02<\u002Fdiv>\n      <div style=\"font-family:'Archivo',sans-serif;font-size:32px;font-weight:700;margin-bottom:16px;\">Matriz de criterios<\u002Fdiv>\n      <div style=\"font-size:26px;line-height:1.4;color:#56657E;\">Evaluamos cada opción contra criterios ponderados sobre 100 puntos.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#FFFFFF;border:1px solid #E2E8F2;border-radius:18px;padding:44px 40px;\">\n      <div style=\"font-family:'Archivo',sans-serif;font-size:30px;font-weight:800;color:#1FA04E;margin-bottom:24px;\">03<\u002Fdiv>\n      <div style=\"font-family:'Archivo',sans-serif;font-size:32px;font-weight:700;margin-bottom:16px;\">Oferta a la medida<\u002Fdiv>\n      <div style=\"font-size:26px;line-height:1.4;color:#56657E;\">Un ranking claro de opciones priorizadas, con riesgos y próximos pasos.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ 3 · DOS ENFOQUES ============ -->\n<section data-label=\"Enfoques\" data-speaker-notes=\"El mismo método se aplica en dos modos: vocacional para elegir carrera y universidad, y ejecutivo para formación profesional. Este caso es vocacional.\" style=\"background:#0C1424;color:#FFFFFF;font-family:'Manrope',sans-serif;padding:84px 100px;display:flex;flex-direction:column;position:relative;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:14px;\">\n    <img src=\"c16a3bb4-622e-4b36-8568-82203992c4d5\" alt=\"Neoma\" style=\"height:32px;width:auto;display:block;\">\n    <span style=\"font-family:'Archivo',sans-serif;font-size:24px;\"><span style=\"font-weight:400;\">grupo<\u002Fspan><span style=\"font-weight:800;\">neoma<\u002Fspan><\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"margin-top:54px;\">\n    <div style=\"font-family:'Archivo',sans-serif;font-size:24px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:#00A3E0;margin-bottom:22px;\">Dos enfoques, un mismo método<\u002Fdiv>\n    <h2 style=\"font-family:'Archivo',sans-serif;font-size:64px;font-weight:700;line-height:1.04;letter-spacing:-0.01em;margin:0;\">Para cada momento de decisión<\u002Fh2>\n  <\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-top:auto;margin-bottom:6px;\">\n    <div style=\"background:#11203B;border-top:4px solid #00A3E0;border-radius:18px;padding:52px 48px;\">\n      <div style=\"font-family:'Archivo',sans-serif;font-size:24px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#00A3E0;margin-bottom:18px;\">Vocacional<\u002Fdiv>\n      <div style=\"font-family:'Archivo',sans-serif;font-size:38px;font-weight:700;margin-bottom:18px;\">Carrera &amp; Universidad<\u002Fdiv>\n      <div style=\"font-size:27px;line-height:1.45;color:#C7D3E6;\">Acompaña a estudiantes a elegir qué y dónde estudiar, alineando intereses con oportunidades reales.<\u002Fdiv>\n      <div style=\"margin-top:28px;display:inline-block;background:rgba(0,163,224,0.16);color:#5CC8F2;font-size:24px;font-weight:600;padding:10px 20px;border-radius:999px;\">Este caso<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#11203B;border-top:4px solid #E6007E;border-radius:18px;padding:52px 48px;\">\n      <div style=\"font-family:'Archivo',sans-serif;font-size:24px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#E6007E;margin-bottom:18px;\">Ejecutivo<\u002Fdiv>\n      <div style=\"font-family:'Archivo',sans-serif;font-size:38px;font-weight:700;margin-bottom:18px;\">Formación Profesional<\u002Fdiv>\n      <div style=\"font-size:27px;line-height:1.45;color:#C7D3E6;\">Empaqueta posgrados, diplomados y programas para profesionales que buscan crecer o reconvertirse.<\u002Fdiv>\n      <div style=\"margin-top:28px;display:inline-block;background:rgba(255,255,255,0.07);color:#9FB0C9;font-size:24px;font-weight:600;padding:10px 20px;border-radius:999px;\">Mismo método<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ 4 · DIVIDER 01 ============ -->\n<section data-label=\"01 Resumen\" data-speaker-notes=\"Sección 1: el resumen del caso y el perfil del estudiante.\" style=\"background:#0C1424;color:#FFFFFF;font-family:'Manrope',sans-serif;padding:84px 100px;display:flex;flex-direction:column;justify-content:center;position:relative;overflow:hidden;\">\n  <img src=\"c16a3bb4-622e-4b36-8568-82203992c4d5\" alt=\"\" style=\"position:absolute;right:80px;top:50%;transform:translateY(-50%);width:420px;height:auto;opacity:0.16;\">\n  <div style=\"font-family:'Archivo',sans-serif;font-size:240px;font-weight:800;line-height:0.9;letter-spacing:-0.03em;color:#1B2C49;\">01<\u002Fdiv>\n  <div style=\"width:120px;height:5px;background:#00A3E0;margin:20px 0 36px;\"><\u002Fdiv>\n  <h2 style=\"font-family:'Archivo',sans-serif;font-size:80px;font-weight:700;letter-spacing:-0.01em;margin:0;\">Resumen del caso<\u002Fh2>\n  <p style=\"font-size:32px;color:#8DA0BC;margin:24px 0 0;max-width:760px;\">Quién es el estudiante, qué busca y los límites de la búsqueda.<\u002Fp>\n<\u002Fsection>\n\n<!-- ============ 5 · RESUMEN DEL CASO ============ -->\n<section data-label=\"Perfil\" data-speaker-notes=\"Estudiante de prepa orientado a negocios + tecnología + datos. Busca una carrera presencial en Monterrey con aplicación práctica.\" style=\"background:#F4F6FA;color:#0C1424;font-family:'Manrope',sans-serif;padding:76px 100px;display:flex;flex-direction:column;position:relative;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;justify-content:space-between;\">\n    <div style=\"font-family:'Archivo',sans-serif;font-size:24px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:#00A3E0;\">Resumen del caso<\u002Fdiv>\n    <div style=\"font-size:24px;color:#8DA0BC;font-weight:500;\">Caso MGL · Perfil del estudiante<\u002Fdiv>\n  <\u002Fdiv>\n  <h2 style=\"font-family:'Archivo',sans-serif;font-size:54px;font-weight:700;line-height:1.05;margin:18px 0 40px;max-width:1200px;\">Alumno de preparatoria próximo a elegir carrera<\u002Fh2>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:30px;flex:1;\">\n    <div style=\"background:#FFFFFF;border:1px solid #E2E8F2;border-radius:16px;padding:36px 38px;\">\n      <div style=\"font-family:'Archivo',sans-serif;font-size:24px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#56657E;margin-bottom:14px;\">Intereses<\u002Fdiv>\n      <div style=\"font-size:30px;line-height:1.4;font-weight:600;\">Negocios, tecnología, datos, IA y emprendimiento.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#FFFFFF;border:1px solid #E2E8F2;border-radius:16px;padding:36px 38px;\">\n      <div style=\"font-family:'Archivo',sans-serif;font-size:24px;font-weight:700;letter-spacing:0.12em;text-transfo eight:1.35;\">Evitar contabilidad pura, programación pura, salud, diseño puro y carreras sin componente de negocio.<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ 6 · DIVIDER 02 ============ -->\n<section data-label=\"02 Criterios\" data-speaker-notes=\"Sección 2: la matriz de criterios con la que evaluamos cada opción.\" style=\"background:#0C1424;color:#FFFFFF;font-family:'Manrope',sans-serif;padding:84px 100px;display:flex;flex-direction:column;justify-content:center;position:relative;overflow:hidden;\">\n  <img src=\"c16a3bb4-622e-4b36-8568-82203992c4d5\" alt=\"\" style=\"position:absolute;right:80px;top:50%;transform:translateY(-50%);width:420px;height:auto;opacity:0.16;\">\n  <div style=\"font-family:'Archivo',sans-serif;font-size:240px;font-weight:800;line-height:0.9;letter-spacing:-0.03em;color:#1B2C49;\">02<\u002Fdiv>\n  <div style=\"width:120px;height:5px;background:#00A3E0;margin:20px 0 36px;\"><\u002Fdiv>\n  <h2 style=\"font-family:'Archivo',sans-serif;font-size:80px;font-weight:700;letter-spacing:-0.01em;margin:0;\">Criterios de evaluación<\u002Fh2>\n  <p style=\"font-size:32px;color:#8DA0BC;margin:24px 0 0;max-width:760px;\">Una matriz de 100 puntos que pondera lo que más importa al cliente.<\u002Fp>\n<\u002Fsection>\n\n<!-- ============ 7 · MATRIZ ============ -->\n<section data-label=\"Matriz\" data-speaker-notes=\"El objetivo del cliente pesa 25 puntos; el área 15; el resto se reparte en bloques de 10. El presupuesto se calificó conservadoramente por no estar definido.\" style=\"background:#F4F6FA;color:#0C1424;font-family:'Manrope',sans-serif;padding:76px 100px;display:flex;flex-direction:column;position:relative;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;justify-content:space-between;\">\n    <div style=\"font-family:'Archivo',sans-serif;font-size:24px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:#00A3E0;\">Criterios de evaluación<\u002Fdiv>\n    <div style=\"font-size:24px;color:#
